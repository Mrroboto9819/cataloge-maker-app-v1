apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-maker
  namespace: catalog-maker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-maker
  template:
    metadata:
      labels:
        app: catalog-maker
    spec:
      nodeSelector:
        nodepool: stage
      containers:
        - name: web
          image: catalog-maker:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-maker-svc
  namespace: catalog-maker
spec:
  selector:
    app: catalog-maker
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalog-maker-ingress
  namespace: catalog-maker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: monitor.pablocabrera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-maker-svc
                port:
                  number: 3000
