apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-maker
  namespace: catalog-maker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-maker
  template:
    metadata:
      labels:
        app: catalog-maker
    spec:
      nodeSelector:
        nodepool: stage
      containers:
        - name: web
          image: catalog-maker:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-maker-svc
  namespace: catalog-maker
spec:
  selector:
    app: catalog-maker
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
# Redirect monitor → catalog middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-catalog
  namespace: catalog-maker
spec:
  redirectRegex:
    regex: "^https?://monitor\\.pablocabrera\\.dev(.*)"
    replacement: "https://catalog.pablocabrera.dev${1}"
    permanent: true
---
# monitor.pablocabrera.dev → redirect to catalog (HTTPS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalog-maker-monitor-redirect
  namespace: catalog-maker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "le"
    traefik.ingress.kubernetes.io/router.middlewares: catalog-maker-redirect-to-catalog@kubernetescrd
spec:
  tls:
    - hosts:
        - monitor.pablocabrera.dev
  rules:
    - host: monitor.pablocabrera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-maker-svc
                port:
                  number: 3000
---
# HTTP → HTTPS redirect middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: catalog-maker
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# HTTP ingress (redirects to HTTPS) — all domains
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalog-maker-http
  namespace: catalog-maker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: catalog-maker-redirect-https@kubernetescrd
spec:
  rules:
    - host: catalog.pablocabrera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-maker-svc
                port:
                  number: 3000
    - host: monitor.pablocabrera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-maker-svc
                port:
                  number: 3000
---
# HTTPS ingress (main)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalog-maker-ingress
  namespace: catalog-maker
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: "le"
spec:
  tls:
    - hosts:
        - catalog.pablocabrera.dev
  rules:
    - host: catalog.pablocabrera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: catalog-maker-svc
                port:
                  number: 3000
